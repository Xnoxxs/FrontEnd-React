name: CI Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      
      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
      
      - name: Test
        run: npm run test:run
      
      - name: Check Format
        run: npm run format:check